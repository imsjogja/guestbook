services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - guestflow_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - guestflow

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - guestflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - guestflow

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/app/migrate"]
    command: ["up"]
    networks:
      - guestflow

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: db
      REDIS_HOST: redis
      STORAGE_LOCAL_PATH: /data/uploads
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - guestflow_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - guestflow

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/app/worker"]
    command: ["-queues=all", "-concurrency=3"]
    networks:
      - guestflow

volumes:
  guestflow_postgres_data:
  guestflow_redis_data:
  guestflow_uploads:

networks:
  guestflow:
    driver: bridge
