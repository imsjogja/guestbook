# GuestFlow - Docker Compose Development Environment
# Services: PostgreSQL 16, Redis 7, Go App, Nginx
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#   docker compose exec app make migrate-up
#   docker compose exec -T db psql -U guestflow -d guestflow < migrations/999_seed_data.up.sql

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Primary Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: guestflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: guestflow
      POSTGRES_PASSWORD: guestflow
      POSTGRES_DB: guestflow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guestflow

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache, Sessions, Rate Limiting, Job Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: guestflow-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guestflow

  # ---------------------------------------------------------------------------
  # GuestFlow Application Server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: guestflow-app
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: guestflow
      DB_USER: guestflow
      DB_PASSWORD: guestflow
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      RATE_LIMIT_RPS: 60
      RATE_LIMIT_BURST: 10
      CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - .:/app:cached
      - go_cache:/go/pkg/mod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - guestflow
    command: ["air", "-c", ".air.toml"]

  # ---------------------------------------------------------------------------
  # Background Queue Workers
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: guestflow-worker
    restart: unless-stopped
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: guestflow
      DB_USER: guestflow
      DB_PASSWORD: guestflow
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
    volumes:
      - .:/app:cached
      - go_cache:/go/pkg/mod
    depends_on:
      - db
      - redis
    networks:
      - guestflow
    command: ["go", "run", "cmd/worker/main.go"]

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (Optional - for local HTTPS simulation)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: guestflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - guestflow

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible Object Storage (Optional)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: guestflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: guestflow
      MINIO_ROOT_PASSWORD: guestflow123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - guestflow

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  go_cache:
    driver: local
  minio_data:
    driver: local

networks:
  guestflow:
    driver: bridge
